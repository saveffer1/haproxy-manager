services:
  postgres:
    image: postgres:17-alpine
    container_name: haproxy-manager-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: haproxy_db
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d haproxy_db"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: always

  redis:
    image: redis:alpine
    container_name: haproxy-manager-redis
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: always
  
  otel-collector:
    image: jaegertracing/all-in-one:latest
    container_name: haproxy-manager-jaeger
    ports:
      - "4319:16686"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

  haproxy:
    build:
      context: .
      dockerfile: ./haproxy/Dockerfile
    container_name: haproxy
    volumes:
      - ./haproxy/conf.d:/usr/local/etc/haproxy/conf.d:ro
      - ./haproxy/certs:/usr/local/etc/haproxy/certs
      - ./haproxy/haproxy_socket:/var/run/
      - ./logs/haproxy:/var/log/haproxy
    command:
      [
        "sh",
        "-lc",
        "mkdir -p /var/log/haproxy /usr/local/etc/haproxy/certs; touch /var/log/haproxy/haproxy.log; if [ ! -s /usr/local/etc/haproxy/certs/localhost.pem ]; then openssl req -x509 -nodes -newkey rsa:2048 -keyout /usr/local/etc/haproxy/certs/localhost.key -out /usr/local/etc/haproxy/certs/localhost.crt -days 3650 -subj '/CN=localhost' && cat /usr/local/etc/haproxy/certs/localhost.key /usr/local/etc/haproxy/certs/localhost.crt > /usr/local/etc/haproxy/certs/localhost.pem; fi; test -s /usr/local/etc/haproxy/certs/localhost.pem || { echo 'haproxy cert generation failed'; exit 1; }; crond; haproxy -W -db -f /usr/local/etc/haproxy/conf.d/ 2>&1 | tee -a /var/log/haproxy/haproxy.log",
      ]
    network_mode: host
    restart: always

  backend:
    build:
      context: .
      dockerfile: ./packages/backend/Dockerfile
    container_name: haproxy-manager-backend
    working_dir: /workspace/packages/backend
    environment:
      NODE_ENV: "${NODE_ENV}"
      API_KEY: "${API_KEY}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
      BETTER_AUTH_URL: "${BETTER_AUTH_URL}"
      BETTER_AUTH_TRUSTED_ORIGINS: "${BETTER_AUTH_TRUSTED_ORIGINS}"
      DATABASE_URL: "postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/haproxy_db"
      REDIS_URL: "redis://redis:6379"
      OTEL_URL: "http://otel-collector:4318/v1/traces"
      OTEL_DASHBOARD_URL: "${OTEL_DASHBOARD_URL}"
      DEFAULT_ADMIN_USERNAME: "${DEFAULT_ADMIN_USERNAME}"
      DEFAULT_ADMIN_EMAIL: "${DEFAULT_ADMIN_EMAIL}"
      DEFAULT_ADMIN_PASSWORD: "${DEFAULT_ADMIN_PASSWORD}"
      DEFAULT_NODE_NAME: "${DEFAULT_NODE_NAME}"
      DEFAULT_NODE_IP_ADDRESS: "${DEFAULT_NODE_IP_ADDRESS}"
      DEFAULT_NODE_IS_LOCAL_SERVICE: "${DEFAULT_NODE_IS_LOCAL_SERVICE}"
      DEFAULT_NODE_TYPE: "${DEFAULT_NODE_TYPE}"
      DEFAULT_NODE_LOG_STRATEGY: "${DEFAULT_NODE_LOG_STRATEGY}"
      DEFAULT_NODE_SSH_USER: "${DEFAULT_NODE_SSH_USER}"
      DEFAULT_NODE_SSH_PORT: "${DEFAULT_NODE_SSH_PORT}"
      DEFAULT_NODE_HAPROXY_STATS_URL: "${DEFAULT_NODE_HAPROXY_STATS_URL}"
      DEFAULT_NODE_HAPROXY_SOCKET_PATH: "${DEFAULT_NODE_HAPROXY_SOCKET_PATH}"
      DEFAULT_NODE_HAPROXY_API_URL: "${DEFAULT_NODE_HAPROXY_API_URL}"
      DEFAULT_NODE_HAPROXY_CONFIG_PATH: "${DEFAULT_NODE_HAPROXY_CONFIG_PATH}"
      HAPROXY_STATS_URL: "${HAPROXY_STATS_URL}"
      HAPROXY_SOCKET_ENABLED: "${HAPROXY_SOCKET_ENABLED}"
      HAPROXY_SOCKET_PATH: "${HAPROXY_SOCKET_PATH}"
      HAPROXY_CONFIG_DIR: "${HAPROXY_CONFIG_DIR}"
      HAPROXY_RELOAD_COMMAND: "${HAPROXY_RELOAD_COMMAND}"
      HAPROXY_VALIDATE_COMMAND: "${HAPROXY_VALIDATE_COMMAND}"
      SSH_KEY_DIR: "${SSH_KEY_DIR}"
    volumes:
      - ./haproxy/conf.d:/workspace/haproxy/conf.d
      - ./packages/backend/.runtime:/workspace/packages/backend/.runtime
      - ./logs/backend:/workspace/packages/backend/logs
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      haproxy:
        condition: service_started
    ports:
      - "4320:3000"
    restart: always

  frontend:
    build:
      context: .
      dockerfile: ./packages/frontend/Dockerfile
      args:
        VITE_BACKEND_URL: "${VITE_BACKEND_URL}"
    container_name: haproxy-manager-frontend
    environment:
      FRONTEND_BACKEND_UPSTREAM: "${FRONTEND_BACKEND_UPSTREAM}"
    volumes:
      - ./packages/frontend/certs:/etc/nginx/certs
    command:
      [
        "sh",
        "-lc",
        "mkdir -p /etc/nginx/certs; if [ ! -f /etc/nginx/certs/localhost.crt ] || [ ! -f /etc/nginx/certs/localhost.key ]; then openssl req -x509 -nodes -newkey rsa:2048 -keyout /etc/nginx/certs/localhost.key -out /etc/nginx/certs/localhost.crt -days 3650 -subj '/CN=localhost'; fi; envsubst '$${FRONTEND_BACKEND_UPSTREAM}' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf; nginx -g 'daemon off;'",
      ]
    depends_on:
      backend:
        condition: service_started
    network_mode: host
    restart: always

volumes:
  postgres_data:
  redis_data:
  haproxy_socket: