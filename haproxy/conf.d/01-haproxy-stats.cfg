# Stats Dashboard
frontend stats
    bind *:8404
    acl from_localhost src 127.0.0.1/8
    acl from_docker src 172.16.0.0/12
    http-request deny unless from_localhost or from_docker
    stats enable
    stats uri /stats
    stats realm HAProxy\ Statistics
    stats auth admin:admin12345
    stats refresh 10s
    stats show-legends
    stats admin if TRUE
    log global
