global
    stats socket /tmp/haproxy.sock mode 660 level admin
    stats timeout 30s
    maxconn 4096
    daemon
    log stdout local0 debug

defaults
    mode http
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    default-server init-addr last,libc,none
    balance roundrobin
    option forwardfor
    option http-server-close

# Stats Dashboard
frontend stats
    bind *:8404
    acl from_localhost src 127.0.0.1/8
    acl from_docker src 172.16.0.0/12
    http-request deny unless from_localhost or from_docker
    stats enable
    stats uri /stats
    stats realm HAProxy\ Statistics
    #stats auth <user>:<pass>
    stats refresh 10s
    stats show-legends
    stats admin if TRUE
    log global

# systemd
#global
#    stats socket /var/run/haproxy.sock mode 666 level admin

# docker
#   stats socket /var/lib/haproxy.sock mode 666 level admin


# loopback port
global
    stats socket 0.0.0.0:16669 mode 666 level admin
